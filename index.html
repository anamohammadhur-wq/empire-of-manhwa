<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>امبراطورية المانهو</title>

<style>

body{

margin:0;
background:#050505;
color:white;
font-family:Tahoma;
direction:rtl;

}

/* النافبار */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#0d0d0d;
border-bottom:2px solid #00ff99;

}

.logo{

font-size:35px;
font-weight:bold;
color:#00ff99;

}

.coins-box{

background:#00ff99;
color:black;
padding:10px 20px;
border-radius:15px;
font-weight:bold;

}

/* البروفايل */

.profile{

display:flex;
align-items:center;
gap:15px;

}

.profile img{

width:60px;
height:60px;
border-radius:50%;
border:3px solid #00ff99;
object-fit:cover;

}

/* الواجهة */

.hero{

text-align:center;
padding:100px 20px;

background:
linear-gradient(
rgba(0,0,0,0.7),
rgba(0,0,0,0.8)
),

url("https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2071");

background-size:cover;

}

.hero h1{

font-size:70px;
color:#00ff99;

}

.hero-buttons button{

padding:15px 30px;
margin:10px;
border:none;
border-radius:15px;
background:#00ff99;
font-size:20px;
font-weight:bold;
cursor:pointer;

}

/* نافذة تسجيل الدخول */

.modal{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);

display:none;
justify-content:center;
align-items:center;

}

.modal-content{

background:#111;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
border:2px solid #00ff99;

}

.modal-content h2{

color:#00ff99;

}

.modal-content input{

width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:10px;
background:#222;
color:white;

}

.modal-content button{

padding:15px 25px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00ff99;
font-weight:bold;
cursor:pointer;

}

.upload-box{

margin-top:15px;

}

/* البطاقات */

.section{

padding:60px 30px;

}

.cards{

display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;

}

.card{

background:#111;
width:300px;
border-radius:20px;
overflow:hidden;
border:2px solid #00ff99;

}

.card img{

width:100%;
height:400px;
object-fit:cover;

}

.card-content{

padding:15px;

}

.card button{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00ff99;
font-weight:bold;
cursor:pointer;

}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">
💀 امبراطورية المانهو
</div>

<div class="coins-box">

🪙
<span id="coins">
3000
</span>

</div>

<div class="profile">

<img
id="profileImage"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
>

<div>

<div id="username">
زائر
</div>

<button onclick="openLogin()">
تسجيل دخول
</button>

</div>

</div>

</header>

<section class="hero">

<h1>
🔥 عالم المانهو الأسطوري
</h1>

<div class="hero-buttons">

<button onclick="spinWheel()">
🎡 عجلة الحظ
</button>

<button onclick="dailyReward()">
🎁 مكافأة يومية
</button>

</div>

</section>

<section class="section">

<div class="cards">

<div class="card">

<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070">

<div class="card-content">

<h3>
Solo Leveling
</h3>

<button onclick="readManhwa('Solo Leveling')">
📖 قراءة
</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1511882150382-421056c89033?q=80&w=1974">

<div class="card-content">

<h3>
Nano Machine
</h3>

<button onclick="readManhwa('Nano Machine')">
📖 قراءة
</button>

</div>

</div>

</div>

</section>

<!-- نافذة تسجيل الدخول -->

<div class="modal"
id="loginModal">

<div class="modal-content">

<h2>
👑 إنشاء حساب
</h2>

<input
type="text"
id="nameInput"
placeholder="اسم المستخدم"
>

<input
type="password"
placeholder="كلمة المرور"
>

<div class="upload-box">

<input
type="file"
id="imageInput"
accept="image/*"
>

</div>

<button onclick="saveProfile()">
حفظ الحساب
</button>

</div>

</div>

<script>

/* العملات */

let coins =
localStorage.getItem("coins")
|| 3000;

document.getElementById("coins")
.innerText = coins;

/* فتح النافذة */

function openLogin(){

document.getElementById(
"loginModal"
).style.display = "flex";

}

/* حفظ الحساب */

function saveProfile(){

let username =
document.getElementById(
"nameInput"
).value;

if(username){

localStorage.setItem(
"username",
username
);

document.getElementById(
"username"
).innerText = username;

}

/* الصورة */

let file =
document.getElementById(
"imageInput"
).files[0];

if(file){

let reader =
new FileReader();

reader.onload = function(e){

let image =
e.target.result;

localStorage.setItem(
"profileImage",
image
);

document.getElementById(
"profileImage"
).src = image;

};

reader.readAsDataURL(file);

}

document.getElementById(
"loginModal"
).style.display = "none";

}

/* تحميل البيانات */

let savedUser =
localStorage.getItem(
"username"
);

if(savedUser){

document.getElementById(
"username"
).innerText = savedUser;

}

let savedImage =
localStorage.getItem(
"profileImage"
);

if(savedImage){

document.getElementById(
"profileImage"
).src = savedImage;

}

/* عجلة الحظ */

function spinWheel(){

let reward =
Math.floor(Math.random()*1000);

coins =
parseInt(coins) + reward;

localStorage.setItem(
"coins",
coins
);

document.getElementById(
"coins"
).innerText = coins;

alert(
"🎡 ربحت " + reward + " عملة"
);

}

/* مكافأة */

function dailyReward(){

coins =
parseInt(coins) + 500;

localStorage.setItem(
"coins",
coins
);

document.getElementById(
"coins"
).innerText = coins;

alert(
"🎁 حصلت على 500 عملة"
);

}

/* قراءة */

function readManhwa(name){

alert(
"📖 جاري قراءة " + name
);

}

</script>

</body>
</html>
