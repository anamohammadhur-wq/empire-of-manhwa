<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>امبراطورية المانهو</title>

<style>

body{

margin:0;
padding:0;
background:#050505;
color:white;
font-family:Tahoma;
direction:rtl;
scroll-behavior:smooth;

}

/* شريط علوي */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#0d0d0d;
border-bottom:2px solid #00ff99;
position:sticky;
top:0;
z-index:999;

}

.logo{

font-size:35px;
font-weight:bold;
color:#00ff99;
text-shadow:0 0 15px #00ff99;

}

nav a{

color:white;
text-decoration:none;
margin:15px;
font-size:18px;
font-weight:bold;

}

nav a:hover{

color:#00ff99;

}

.coins-box{

background:#00ff99;
color:black;
padding:12px 20px;
border-radius:15px;
font-weight:bold;

}

/* البحث */

.search-box{

text-align:center;
margin:30px;

}

.search-box input{

width:60%;
padding:18px;
border:none;
border-radius:15px;
background:#111;
color:white;
font-size:18px;
border:2px solid #00ff99;

}

/* الواجهة */

.hero{

text-align:center;
padding:120px 20px;

background:
linear-gradient(
rgba(0,0,0,0.7),
rgba(0,0,0,0.8)
),

url("https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2071");

background-size:cover;
background-position:center;

}

.hero h1{

font-size:80px;
color:#00ff99;
text-shadow:0 0 25px #00ff99;

}

.hero p{

font-size:30px;

}

/* الأزرار */

.hero-buttons button{

padding:18px 35px;
margin:10px;
border:none;
border-radius:15px;
background:#00ff99;
color:black;
font-size:20px;
font-weight:bold;
cursor:pointer;

}

.hero-buttons button:hover{

transform:scale(1.07);

}

/* الأقسام */

.section{

padding:70px 40px;

}

.section h2{

font-size:40px;
color:#00ff99;

}

/* البطاقات */

.cards{

display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;

}

.card{

background:#111;
border-radius:20px;
overflow:hidden;
width:300px;
border:2px solid #00ff99;
transition:0.3s;

}

.card:hover{

transform:translateY(-10px);
box-shadow:0 0 25px #00ff99;

}

.card img{

width:100%;
height:400px;
object-fit:cover;

}

.card-content{

padding:15px;

}

.card h3{

font-size:25px;

}

.card button{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00ff99;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;

}

/* معلومات */

.info{

display:flex;
justify-content:space-between;
margin-top:10px;
font-size:18px;

}

/* إشعارات */

.notification{

position:fixed;
bottom:20px;
left:20px;
background:#00ff99;
color:black;
padding:15px 25px;
border-radius:15px;
font-weight:bold;
display:none;
z-index:9999;

}

/* زر الأعلى */

.topBtn{

position:fixed;
bottom:20px;
right:20px;
background:#00ff99;
color:black;
border:none;
padding:15px;
border-radius:50%;
font-size:20px;
cursor:pointer;
display:none;

}

footer{

text-align:center;
padding:30px;
background:#0d0d0d;
margin-top:50px;

}

</style>

</head>

<body>

<div class="notification"
id="notification">

تم التنفيذ

</div>

<button class="topBtn"
id="topBtn"
onclick="scrollToTop()">

⬆️

</button>

<header class="navbar">

<div class="logo">

💀 امبراطورية المانهو

</div>

<nav>

<a href="#">الرئيسية</a>
<a href="#">الأحدث</a>
<a href="#">الأكثر مشاهدة</a>
<a href="#">البروفايل</a>

</nav>

<div class="coins-box">

🪙
<span id="coins">
3000
</span>

</div>

</header>

<div class="search-box">

<input
type="text"
placeholder="ابحث عن مانهوا..."
onkeyup="searchManhwa(this.value)"
>

</div>

<section class="hero">

<h1>

🔥 عالم المانهو الأسطوري

</h1>

<p>

أفضل موقع مانهوا عربي في المجرة ☠️

</p>

<div class="hero-buttons">

<button onclick="spinWheel()">

🎡 عجلة الحظ

</button>

<button onclick="dailyReward()">

🎁 مكافأة يومية

</button>

<button onclick="login()">

👑 تسجيل دخول

</button>

</div>

</section>

<section class="section">

<h2>

🔥 أحدث المانهوا

</h2>

<div class="cards">

<div class="card">

<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070">

<div class="card-content">

<h3>
Solo Leveling
</h3>

<button onclick="readManhwa('Solo Leveling')">
📖 قراءة
</button>

<div class="info">

<span onclick="likeManhwa()">
❤️ 120
</span>

<span>
👁️ 15K
</span>

</div>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1511882150382-421056c89033?q=80&w=1974">

<div class="card-content">

<h3>
Nano Machine
</h3>

<button onclick="readManhwa('Nano Machine')">
📖 قراءة
</button>

<div class="info">

<span onclick="likeManhwa()">
❤️ 98
</span>

<span>
👁️ 11K
</span>

</div>

</div>

</div>

</div>

</section>

<footer>

👑 LVL 99 | امبراطورية المانهو 2026

</footer>

<script>

let coins =
localStorage.getItem("coins")
|| 3000;

function updateCoins(){

document.getElementById("coins")
.innerText = coins;

localStorage.setItem(
"coins",
coins
);

}

updateCoins();

/* إشعار */

function showNotification(text){

let notification =
document.getElementById(
"notification"
);

notification.innerText = text;

notification.style.display =
"block";

setTimeout(()=>{

notification.style.display =
"none";

},2000);

}

/* عجلة الحظ */

function spinWheel(){

let reward =
Math.floor(Math.random()*1000);

coins =
parseInt(coins) + reward;

updateCoins();

showNotification(
"🎡 ربحت " + reward + " عملة"
);

}

/* مكافأة */

function dailyReward(){

coins =
parseInt(coins) + 500;

updateCoins();

showNotification(
"🎁 حصلت على 500 عملة"
);

}

/* تسجيل دخول */

function login(){

let username =
prompt("ادخل اسمك");

if(username){

localStorage.setItem(
"username",
username
);

showNotification(
"👑 أهلاً " + username
);

}

}

/* قراءة */

function readManhwa(name){

showNotification(
"📖 جاري قراءة " + name
);

}

/* لايك */

function likeManhwa(){

showNotification(
"❤️ تم إضافة لايك"
);

}

/* بحث */

function searchManhwa(value){

let cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

let title =
card.innerText.toLowerCase();

if(title.includes(
value.toLowerCase()
)){

card.style.display =
"block";

}else{

card.style.display =
"none";

}

});

}

/* زر الأعلى */

window.onscroll = function(){

let topBtn =
document.getElementById(
"topBtn"
);

if(document.body.scrollTop > 300
|| document.documentElement.scrollTop > 300){

topBtn.style.display =
"block";

}else{

topBtn.style.display =
"none";

}

};

function scrollToTop(){

window.scrollTo({

top:0,
behavior:"smooth"

});

}

</script>

</body>
</html>
</body>
</html>
